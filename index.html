<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mood Cafe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF0DC;--cream-dark:#F2E0C0;--brown:#7B2D00;--brown-light:#C97040;--text-dark:#3D1800;--text-mid:#6B3010;--warm:#FFF8EE;}
body{font-family:'Inter',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px}
.hero{text-align:center;margin-bottom:32px}
.hero img{width:72px;height:72px;object-fit:contain;border-radius:50%;margin:0 auto 12px;display:block}
.hero h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--brown);font-weight:500}
.hero p{font-size:13px;color:var(--text-mid);margin-top:5px}
.sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mid);margin:20px 0 10px;width:100%;max-width:480px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px}
.card{background:var(--warm);border:1px solid var(--cream-dark);border-radius:14px;padding:18px 14px;text-align:center;text-decoration:none;color:var(--text-dark);transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(123,45,0,.12)}
.card.table{border-top:3px solid var(--brown)}
.card.staff{border-top:3px solid var(--brown-light)}
.icon{font-size:28px}.label{font-size:14px;font-weight:500;color:var(--brown)}.sub{font-size:11px;color:var(--text-mid)}
.setup-note{margin-top:28px;max-width:480px;background:var(--warm);border:1px solid var(--cream-dark);border-radius:12px;padding:14px 16px;font-size:12px;color:var(--text-mid);line-height:1.7}
.setup-note strong{color:var(--brown)}
.setup-note code{background:var(--cream-dark);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px;color:var(--text-dark)}
</style>
</head>
