<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mood Cafe — Table 2</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF0DC;--cream-dark:#F2E0C0;--brown:#7B2D00;--brown-mid:#A04020;--brown-light:#C97040;--text-dark:#3D1800;--text-mid:#6B3010;--warm:#FFF8EE;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--warm);border-bottom:1px solid var(--cream-dark);position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar img{width:36px;height:36px;object-fit:contain;border-radius:50%;flex-shrink:0}
.topbar-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--brown);font-weight:500}
.topbar-sub{font-size:11px;color:var(--text-mid)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;margin-left:auto}
.conn-dot.online{background:#5A9E1A}
.conn-dot.offline{background:#D93B3B}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text-dark);color:var(--warm);padding:9px 18px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.tbl-badge{margin-left:auto;background:var(--brown);color:var(--warm);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap}
.wrap{max-width:520px;margin:0 auto;padding:12px 10px 110px}
.cat-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--cream-dark);background:var(--warm);color:var(--text-mid);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
.cat-btn.active{background:var(--brown);color:var(--warm);border-color:var(--brown)}
.sec-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mid);margin-bottom:10px}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.icard{background:var(--warm);border-radius:12px;border:1px solid var(--cream-dark);overflow:hidden;position:relative}
.icard-img{width:100%;height:110px;object-fit:cover;display:block}
.icard-body{padding:8px 10px 38px}
.icard-name{font-size:12px;font-weight:500;color:var(--text-dark);line-height:1.3;margin-bottom:3px}
.icard-price{font-size:12px;color:var(--brown-mid);font-weight:500}
.add-btn{position:absolute;bottom:8px;right:8px;width:26px;height:26px;border-radius:50%;background:var(--brown);border:none;color:var(--warm);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-ctrl{position:absolute;bottom:8px;right:6px;display:flex;align-items:center;gap:4px;background:var(--warm);border:1px solid var(--cream-dark);border-radius:20px;padding:3px 7px}
.qty-ctrl button{width:20px;height:20px;border-radius:50%;background:var(--brown);border:none;color:var(--warm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.qty-ctrl span{font-size:12px;font-weight:500;min-width:16px;text-align:center;color:var(--text-dark)}
.fab-wrap{position:fixed;bottom:70px;right:14px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:60}
.fab-list{display:flex;flex-direction:column;gap:8px;align-items:flex-end;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .25s ease;pointer-events:none}
.fab-list.open{max-height:240px;opacity:1;pointer-events:auto}
.fab-row{display:flex;align-items:center;gap:8px;border:none;background:none;padding:0;cursor:pointer}
.fab-lbl{background:var(--warm);border:1px solid var(--cream-dark);padding:7px 13px;border-radius:20px;font-size:12px;color:var(--text-dark);white-space:nowrap;font-family:'Inter',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.fab-ico{width:36px;height:36px;border-radius:50%;background:var(--brown-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fab-btn{width:50px;height:50px;border-radius:50%;background:var(--brown);border:none;color:var(--warm);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(123,45,0,.35);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.fab-btn.open{transform:rotate(45deg)}
.fab-plus{width:22px;height:22px;position:relative;pointer-events:none}
.fab-plus::before,.fab-plus::after{content:'';position:absolute;background:var(--warm);border-radius:2px}
.fab-plus::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%)}
.fab-plus::after{height:2px;width:100%;top:50%;left:0;transform:translateY(-50%)}
.cart-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;background:var(--warm);border-top:1px solid var(--cream-dark);display:flex;align-items:center;gap:10px;z-index:70;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.cart-bar-btn{flex:1;padding:11px;background:var(--brown);color:var(--warm);border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.cart-count{background:#E24B4A;color:#fff;border-radius:50%;width:24px;height:24px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(61,24,0,.55);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--warm);border-radius:16px;padding:20px;width:min(340px,93vw);max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--brown);margin-bottom:12px;font-weight:500}
.modal-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--cream-dark)}
.modal-item img{width:42px;height:42px;object-fit:cover;border-radius:8px;flex-shrink:0}
.modal-item-name{font-size:12px;font-weight:500;color:var(--text-dark);flex:1}
.modal-item-price{font-size:12px;color:var(--brown-mid);font-weight:500;white-space:nowrap}
.modal-total{display:flex;justify-content:space-between;font-size:14px;font-weight:500;color:var(--text-dark);padding:10px 0 6px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-cancel{background:var(--cream-dark);color:var(--text-mid)}
.btn-confirm{background:var(--brown);color:var(--warm);font-weight:500}
.status-banner{display:none;padding:10px 14px;margin-bottom:12px;border-radius:10px;font-size:12px;border-left:3px solid var(--brown-light);background:var(--cream-dark)}
.status-banner.show{display:block}
.status-banner .s-title{font-weight:500;color:var(--brown);margin-bottom:2px}
</style>
</head>

<script>

// ── Firebase Config (free Realtime DB) ──────────────────────────────────────
const FB_URL = 'https://mood-cafe-default-rtdb.firebaseio.com';

async function dbRead(path) {
  try {
    const r = await fetch(FB_URL + path + '.json');
    const d = await r.json();
    return d || {};
  } catch(e) { return {}; }
}

async function dbWrite(path, data) {
  try {
    await fetch(FB_URL + path + '.json', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) { console.error('DB write failed', e); }
}

async function dbPush(path, data) {
  try {
    const r = await fetch(FB_URL + path + '.json', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const res = await r.json();
    return res.name; // Firebase push key
  } catch(e) { console.error('DB push failed', e); return null; }
}

async function dbPatch(path, data) {
  try {
    await fetch(FB_URL + path + '.json', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) { console.error('DB patch failed', e); }
}

// SSE live listener using Firebase streaming REST API
function dbListen(path, cb) {
  const url = FB_URL + path + '.json';
  let es;
  function connect() {
    es = new EventSource(url);
    es.addEventListener('put', e => { try { cb(JSON.parse(e.data)); } catch(_){} });
    es.addEventListener('patch', e => { try { cb(null); } catch(_){} });
    es.onerror = () => { es.close(); setTimeout(connect, 3000); };
  }
  connect();
}

};

const MENU = [
  {cat:'Hot Drinks',items:[
    {name:'Coffee',price:80},
    {name:'Cutting Tea',price:30},
    {name:'Lemon Tea',price:50},
    {name:'Mint Tea',price:50},
  ]},
  {cat:'Food',items:[
    {name:'Chicken Fried Rice',price:180},
    {name:'Spicy Chicken',price:220},
    {name:'Ramen Noodle',price:160},
    {name:'Momo',price:120},
  ]},
  {cat:'Cold Drinks',items:[
    {name:'Iced Tea',price:70},
    {name:'Chocolate Milkshake',price:110},
    {name:'Mango Smoothie',price:100},
  ]},
  {cat:'Snacks',items:[
    {name:'Chatpat',price:40},
    {name:'Sel Roti',price:30},
    {name:'Pani Puri',price:50},
  ]},
  {cat:'Dessert',items:[
    {name:'Kheer',price:80},
    {name:'Jeri',price:60},
    {name:'Brownies',price:90},
    {name:'Cheesecake',price:130},
    {name:'Lemon Pie',price:110},
  ]},
];


const TABLE_NUM = 2;
let cart = {}, fabOpen = false, activeCat = MENU[0].cat;
let myOrderKey = null;

// Connection indicator
function setOnline(v) { document.getElementById('conn-dot').className = 'conn-dot ' + (v?'online':'offline'); }
setOnline(navigator.onLine);
window.addEventListener('online',  ()=>setOnline(true));
window.addEventListener('offline', ()=>setOnline(false));

// ── FAB ──
function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fab-btn').classList.toggle('open', fabOpen);
  document.getElementById('fab-list').classList.toggle('open', fabOpen);
}

// ── ASSIST ──
async function assist(type) {
  fabOpen = false;
  document.getElementById('fab-btn').classList.remove('open');
  document.getElementById('fab-list').classList.remove('open');
  const labels = {waiter:'Waiter called',water:'Water requested',clean:'Table clean requested'};
  await dbPush('/assists', {type, table:TABLE_NUM, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), seen:false});
  toast(labels[type] + ' — waiter notified 🔔');
}

// ── MENU ──
function buildMenu(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('sec-label').textContent = cat;
  const sec = MENU.find(s => s.cat === cat);
  const grid = document.getElementById('item-grid');
  grid.innerHTML = '';
  sec.items.forEach(item => {
    const qty = cart[item.name] || 0;
    const card = document.createElement('div');
    card.className = 'icard';
    card.innerHTML = `<img class="icard-img" src="${IMGS[item.name]||''}" alt="${item.name}">
      <div class="icard-body"><div class="icard-name">${item.name}</div><div class="icard-price">Rs ${item.price}</div></div>` +
      (qty === 0
        ? `<button class="add-btn" onclick="addItem('${item.name}',${item.price})">+</button>`
        : `<div class="qty-ctrl"><button onclick="removeItem('${item.name}')">−</button><span>${qty}</span><button onclick="addItem('${item.name}',${item.price})">+</button></div>`);
    grid.appendChild(card);
  });
}

function addItem(name, price) {
  cart[name] = (cart[name]||0)+1; updateCount(); buildMenu(activeCat); toast('Added '+name);
}
function removeItem(name) {
  if(cart[name]>1) cart[name]--; else delete cart[name];
  updateCount(); buildMenu(activeCat);
}
function updateCount() {
  document.getElementById('cart-count').textContent = Object.values(cart).reduce((s,q)=>s+q,0);
}

// ── CART / ORDER ──
function openCart() {
  const keys = Object.keys(cart);
  if(!keys.length) { toast('Your order is empty'); return; }
  const allItems = MENU.flatMap(s=>s.items);
  let total=0, html='';
  keys.forEach(name => {
    const it = allItems.find(i=>i.name===name);
    const sub = it.price*cart[name]; total+=sub;
    html += `<div class="modal-item"><img src="${IMGS[name]||''}" alt="${name}"><span class="modal-item-name">${name} ×${cart[name]}</span><span class="modal-item-price">Rs ${sub}</span></div>`;
  });
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-title">Order — Table ${TABLE_NUM}</div>
    ${html}
    <div class="modal-total"><span>Total</span><span>Rs ${total}</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="placeOrder()">Place order</button>
    </div>`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

async function placeOrder() {
  closeModal();
  const allItems = MENU.flatMap(s=>s.items);
  const items = Object.entries(cart).map(([name,qty]) => {
    const it = allItems.find(i=>i.name===name);
    return {name,qty,price:it.price,img:IMGS[name]||''};
  });
  const order = {table:TABLE_NUM,items,status:'pending',time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
  myOrderKey = await dbPush('/orders', order);
  cart={}; updateCount(); buildMenu(activeCat);
  toast('✅ Order placed! Awaiting waiter approval');
}

// ── STATUS BANNER (live updates from DB) ──
function updateBanner(data) {
  const banner = document.getElementById('status-banner');
  const orders = data ? Object.values(data) : [];
  const mine = orders.filter(o=>o.table===TABLE_NUM&&o.status!=='done').sort((a,b)=>b.ts-a.ts)[0];
  if(!mine) { banner.classList.remove('show'); return; }
  banner.classList.add('show');
  const map = {
    pending:  ['⏳ Order pending approval','Your order is waiting for waiter confirmation'],
    approved: ['✅ Approved — Kitchen is preparing your order!','Sit back and relax 🍴'],
    rejected: ['❌ Order was not accepted','Please speak with a waiter'],
    done:     ['🍽️ Your order has been served!','Enjoy your meal!'],
  };
  const [title, detail] = map[mine.status]||['',''];
  document.getElementById('s-title').textContent = title;
  document.getElementById('s-detail').textContent = detail;
}

function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function initCats() {
  const strip = document.getElementById('cat-strip');
  MENU.forEach(s => {
    const b=document.createElement('button'); b.className='cat-btn'; b.dataset.cat=s.cat; b.textContent=s.cat;
    b.onclick=()=>buildMenu(s.cat); strip.appendChild(b);
  });
  buildMenu(MENU[0].cat);
}

// Live listener for order status
dbListen('/orders', d => updateBanner(d.data||d));
initCats();
</script>
